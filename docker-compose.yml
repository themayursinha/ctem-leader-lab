services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ctem
      POSTGRES_PASSWORD: ctem
      POSTGRES_DB: ctem
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctem"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      - CTEM_DATABASE_URL=postgresql+psycopg2://ctem:ctem@db:5432/ctem
      - CTEM_CORS_ORIGINS=http://localhost:8080
      - CTEM_ADMIN_TOKEN=${CTEM_ADMIN_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  pg-data:
