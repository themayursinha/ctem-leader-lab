services:
  backend:
    build: ./backend
    environment:
      - CTEM_DB_PATH=/data/ctem.db
      - CORS_ORIGINS=http://localhost:8080
      # Set CTEM_ADMIN_TOKEN in your shell or .env to require a token for mutating APIs.
      - CTEM_ADMIN_TOKEN=${CTEM_ADMIN_TOKEN:-}
    volumes:
      - ctem-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ctem-data:
