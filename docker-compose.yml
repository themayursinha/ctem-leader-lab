services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CTEM_DB_PATH=/data/ctem.db
      - CORS_ORIGINS=http://localhost:8080
    volumes:
      - ctem-data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ctem-data:
