name: Supply Chain Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"

      - name: Audit npm dependencies
        working-directory: frontend
        run: |
          npm ci
          npm audit --production --audit-level=high

      - name: Verify Python hash pinning
        run: grep -q -- '--hash=sha256' backend/requirements.txt

      - name: Verify Docker digest pinning
        run: |
          failed=0
          for f in backend/Dockerfile frontend/Dockerfile; do
            while IFS= read -r line; do
              if ! echo "$line" | grep -q '@sha256:'; then
                echo "::error::$f: digest not pinned — $line"
                failed=1
              fi
            done < <(grep '^FROM ' "$f")
          done
          exit "$failed"

      - name: Verify GitHub Actions SHA pinning
        run: |
          ! grep -rE 'uses:\s+[^@]+@v[0-9]' .github/workflows/

      - name: Secrets scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0